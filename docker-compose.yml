services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7}
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=${STACK_NAME:-os7}_ingress
      - --providers.file.filename=/etc/traefik/dynamic/local-web.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/local-web.yml:/etc/traefik/dynamic/local-web.yml:ro
    networks:
      - ingress
    deploy:
      restart_policy:
        condition: any

  manager:
    image: ${MANAGER_IMAGE:-os7-manager}:${MANAGER_IMAGE_TAG:-local}
    environment:
      PORT: "80"
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_ROOT_USER: ${MYSQL_ROOT_USER:-root}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_INTERNAL_ENDPOINT:-http://seaweedfs:8333}
      STORAGE_S3_INTERNAL_ENDPOINT: ${STORAGE_S3_INTERNAL_ENDPOINT:-http://seaweedfs:8333}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY_ID: ${SEAWEEDFS_S3_ACCESS_KEY:-os7-local-access-key}
      STORAGE_S3_SECRET_ACCESS_KEY: ${SEAWEEDFS_S3_SECRET_KEY:-os7-local-secret-key-change-me}
      STORAGE_S3_BUCKET_PREFIX: ${STORAGE_S3_BUCKET_PREFIX:-os7-local}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-os7-local-web}
      STORAGE_S3_FORCE_PATH_STYLE: ${STORAGE_S3_FORCE_PATH_STYLE:-true}
      USER_INSTANCE_IMAGE: ${USER_INSTANCE_IMAGE:-ghcr.io/llm-to-apps/user-instance:latest}
      STACK_NAME: ${STACK_NAME:-os7}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${MANAGER_PORT:-8080}:80"
    networks:
      - internal
      - db
    deploy:
      restart_policy:
        condition: any

  forgejo:
    image: ${FORGEJO_IMAGE:-codeberg.org/forgejo/forgejo:15}
    entrypoint: ["/usr/local/bin/forgejo-bootstrap.sh"]
    environment:
      USER_UID: ${FORGEJO_USER_UID:-1000}
      USER_GID: ${FORGEJO_USER_GID:-1000}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: ${FORGEJO_POSTGRES_DATABASE:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_POSTGRES_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_POSTGRES_PASSWORD:-forgejo}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:8081/}
      FORGEJO__server__HTTP_PORT: "80"
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO_SSH_DOMAIN:-localhost}
      FORGEJO__server__SSH_PORT: ${FORGEJO_SSH_PORT:-2222}
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:-dev-forgejo-secret-key-change-me}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN:-dev-forgejo-internal-token-change-me}
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:-true}
      FORGEJO_ADMIN_USER: ${FORGEJO_ADMIN_USER:-root}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD:-admin1234}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:-root@example.local}
    ports:
      - "${FORGEJO_HTTP_PORT:-8081}:80"
      - "${FORGEJO_SSH_PORT:-8085}:22"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - forgejo-data:/data
      - ./docker/forgejo/bootstrap.sh:/usr/local/bin/forgejo-bootstrap.sh:ro
    networks:
      db:
        aliases:
          - forgejo
    deploy:
      restart_policy:
        condition: any

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:4.34}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /tmp/seaweedfs-iam.json <<EOF
        {
          "sts": {
            "tokenDuration": "1h",
            "maxSessionLength": "12h",
            "issuer": "seaweedfs-sts",
            "signingKey": "$${SEAWEEDFS_IAM_SIGNING_KEY}"
          },
          "providers": [],
          "policies": [],
          "roles": []
        }
        EOF
        cat > /etc/seaweedfs/filer.toml <<EOF
        [leveldb2]
        enabled = false
        dir = "/data/filerldb2"

        [postgres]
        enabled = true
        hostname = "$${SEAWEEDFS_POSTGRES_HOST}"
        port = $${SEAWEEDFS_POSTGRES_PORT}
        username = "$${SEAWEEDFS_POSTGRES_USER}"
        password = "$${SEAWEEDFS_POSTGRES_PASSWORD}"
        database = "$${SEAWEEDFS_POSTGRES_DATABASE}"
        sslmode = "$${SEAWEEDFS_POSTGRES_SSLMODE}"
        connection_max_idle = $${SEAWEEDFS_POSTGRES_CONNECTION_MAX_IDLE}
        connection_max_open = $${SEAWEEDFS_POSTGRES_CONNECTION_MAX_OPEN}
        EOF
        exec weed server \
          -ip=seaweedfs \
          -ip.bind=0.0.0.0 \
          -dir=/data \
          -master.port=9333 \
          -master.port.grpc=19333 \
          -volume.port=8080 \
          -volume.port.grpc=18080 \
          -volume.index=leveldbMedium \
          -filer \
          -filer.port=8888 \
          -filer.port.grpc=18888 \
          -s3 \
          -s3.port=8333 \
          -s3.iam=true \
          -s3.iam.readOnly=false \
          -s3.iam.config=/tmp/seaweedfs-iam.json
    environment:
      AWS_ACCESS_KEY_ID: ${SEAWEEDFS_S3_ACCESS_KEY:-os7-local-access-key}
      AWS_SECRET_ACCESS_KEY: ${SEAWEEDFS_S3_SECRET_KEY:-os7-local-secret-key-change-me}
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:-os7-local-access-key}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:-os7-local-secret-key-change-me}
      SEAWEEDFS_IAM_SIGNING_KEY: ${SEAWEEDFS_IAM_SIGNING_KEY:-b3M3LWxvY2FsLXNlYXdZWVktaWFtLXNpZ25pbmcta2V5}
      SEAWEEDFS_POSTGRES_HOST: ${SEAWEEDFS_POSTGRES_HOST:-postgres}
      SEAWEEDFS_POSTGRES_PORT: ${SEAWEEDFS_POSTGRES_PORT:-5432}
      SEAWEEDFS_POSTGRES_DATABASE: ${SEAWEEDFS_POSTGRES_DATABASE:-seaweedfs}
      SEAWEEDFS_POSTGRES_USER: ${SEAWEEDFS_POSTGRES_USER:-seaweedfs}
      SEAWEEDFS_POSTGRES_PASSWORD: ${SEAWEEDFS_POSTGRES_PASSWORD:-seaweedfs}
      SEAWEEDFS_POSTGRES_SSLMODE: ${SEAWEEDFS_POSTGRES_SSLMODE:-disable}
      SEAWEEDFS_POSTGRES_CONNECTION_MAX_IDLE: ${SEAWEEDFS_POSTGRES_CONNECTION_MAX_IDLE:-100}
      SEAWEEDFS_POSTGRES_CONNECTION_MAX_OPEN: ${SEAWEEDFS_POSTGRES_CONNECTION_MAX_OPEN:-100}
    ports:
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
    volumes:
      - seaweedfs-data:/data
    networks:
      db:
        aliases:
          - seaweedfs
      internal:
        aliases:
          - seaweedfs
    deploy:
      restart_policy:
        condition: any

  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg17}
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-os7_platform}
      POSTGRES_USER: ${POSTGRES_USER:-os7}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FORGEJO_POSTGRES_DATABASE: ${FORGEJO_POSTGRES_DATABASE:-forgejo}
      FORGEJO_POSTGRES_USER: ${FORGEJO_POSTGRES_USER:-forgejo}
      FORGEJO_POSTGRES_PASSWORD: ${FORGEJO_POSTGRES_PASSWORD:-forgejo}
      SEAWEEDFS_POSTGRES_DATABASE: ${SEAWEEDFS_POSTGRES_DATABASE:-seaweedfs}
      SEAWEEDFS_POSTGRES_USER: ${SEAWEEDFS_POSTGRES_USER:-seaweedfs}
      SEAWEEDFS_POSTGRES_PASSWORD: ${SEAWEEDFS_POSTGRES_PASSWORD:-seaweedfs}
    ports:
      - "${POSTGRES_PORT:-8082}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-forgejo-db.sh:/docker-entrypoint-initdb.d/20-forgejo-db.sh:ro
    networks:
      db:
        aliases:
          - postgres
    deploy:
      restart_policy:
        condition: any

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      db:
        aliases:
          - mysql
    deploy:
      restart_policy:
        condition: any

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    ports:
      - "${REDIS_PORT:-8084}:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      restart_policy:
        condition: any

volumes:
  forgejo-data:
  seaweedfs-data:
  postgres-data:
  mysql-data:
  redis-data:

networks:
  db:
    attachable: true
  ingress:
    attachable: true
  internal:
    attachable: true
