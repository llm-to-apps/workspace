services:
  manager:
    build:
      context: ./manager
    environment:
      PORT: "8080"
      ROOT_DOMAIN: ${ROOT_DOMAIN:-localhost}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_ROOT_USER: ${MYSQL_ROOT_USER:-root}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      USER_INSTANCE_IMAGE: ${USER_INSTANCE_IMAGE:-llagents/user-instance:latest}
      DB_NETWORK_ID: ${DB_NETWORK_ID:-llagents_local_db}
      INGRESS_NETWORK_ID: ${INGRESS_NETWORK_ID:-llagents_local_ingress}
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mysql
    networks:
      - internal
      - db
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-llagents_platform}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      db:
        aliases:
          - mysql
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - internal
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  internal:
    name: ${INTERNAL_NETWORK_ID:-llagents_local_internal}
    external: true
  db:
    name: ${DB_NETWORK_ID:-llagents_local_db}
    external: true
  ingress:
    name: ${INGRESS_NETWORK_ID:-llagents_local_ingress}
    external: true
