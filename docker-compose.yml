services:
  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7}
    command:
      - --log.level=INFO
      - --api.dashboard=false
      - --entrypoints.web.address=:80
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=${INGRESS_NETWORK_ID:-llagents_local_ingress}
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ingress
    deploy:
      restart_policy:
        condition: any

  manager:
    image: ${MANAGER_IMAGE:-orchestra-manager}:${MANAGER_IMAGE_TAG:-local}
    environment:
      PORT: "8080"
      ROOT_DOMAIN: ${ROOT_DOMAIN:-localhost}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_ROOT_USER: ${MYSQL_ROOT_USER:-root}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      USER_INSTANCE_IMAGE: ${USER_INSTANCE_IMAGE:-llagents/user-instance:latest}
      DB_NETWORK_ID: ${DB_NETWORK_ID:-llagents_local_db}
      INGRESS_NETWORK_ID: ${INGRESS_NETWORK_ID:-llagents_local_ingress}
    ports:
      - "${MANAGER_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
      - db
    deploy:
      restart_policy:
        condition: any

  forgejo:
    image: ${FORGEJO_IMAGE:-codeberg.org/forgejo/forgejo:15}
    entrypoint: ["/usr/local/bin/forgejo-bootstrap.sh"]
    environment:
      USER_UID: ${FORGEJO_USER_UID:-1000}
      USER_GID: ${FORGEJO_USER_GID:-1000}
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: host.docker.internal:5432
      FORGEJO__database__NAME: ${FORGEJO_POSTGRES_DATABASE:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_POSTGRES_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_POSTGRES_PASSWORD:-forgejo}
      FORGEJO__server__ROOT_URL: ${FORGEJO_ROOT_URL:-http://localhost:13002/}
      FORGEJO__server__SSH_DOMAIN: ${FORGEJO_SSH_DOMAIN:-localhost}
      FORGEJO__server__SSH_PORT: ${FORGEJO_SSH_PORT:-2222}
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:-dev-forgejo-secret-key-change-me}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN:-dev-forgejo-internal-token-change-me}
      FORGEJO__service__DISABLE_REGISTRATION: ${FORGEJO_DISABLE_REGISTRATION:-false}
      FORGEJO_ADMIN_USER: ${FORGEJO_ADMIN_USER:-root}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_ADMIN_PASSWORD:-admin1234}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:-root@example.local}
    ports:
      - "${FORGEJO_HTTP_PORT:-13002}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    volumes:
      - forgejo-data:/data
      - ./docker/forgejo/bootstrap.sh:/usr/local/bin/forgejo-bootstrap.sh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      restart_policy:
        condition: any

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-llagents_platform}
      POSTGRES_USER: ${POSTGRES_USER:-llagents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FORGEJO_POSTGRES_DATABASE: ${FORGEJO_POSTGRES_DATABASE:-forgejo}
      FORGEJO_POSTGRES_USER: ${FORGEJO_POSTGRES_USER:-forgejo}
      FORGEJO_POSTGRES_PASSWORD: ${FORGEJO_POSTGRES_PASSWORD:-forgejo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-forgejo-db.sh:/docker-entrypoint-initdb.d/20-forgejo-db.sh:ro
    networks:
      default:
      db:
        aliases:
          - postgres
    deploy:
      restart_policy:
        condition: any

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      db:
        aliases:
          - mysql
    deploy:
      restart_policy:
        condition: any

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      restart_policy:
        condition: any

volumes:
  forgejo-data:
  postgres-data:
  mysql-data:
  redis-data:

networks:
  db:
    name: ${DB_NETWORK_ID:-llagents_local_db}
    external: true
  ingress:
    name: ${INGRESS_NETWORK_ID:-llagents_local_ingress}
    external: true
  internal:
    name: ${INTERNAL_NETWORK_ID:-llagents_local_internal}
    external: true
