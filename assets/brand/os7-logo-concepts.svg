<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>OS7 logo concepts</title>
  <desc>Vector logo concept sheet for OS7.</desc>

  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="0.48" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="signal-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="0.5" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="1100" fill="#F8FAFC"/>

  <g opacity="0.75">
    <path d="M80 120H1520" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M80 560H1520" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M80 980H1520" stroke="#E2E8F0" stroke-width="2"/>
  </g>

  <text x="80" y="70" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">OS7 logo concepts</text>
  <text x="80" y="101" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="18">AI-built personal and company software OS</text>

  <!-- Concept A: orbit mark -->
  <g transform="translate(110 170)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#FFFFFF"/>
    <g transform="translate(52 52)">
      <circle cx="86" cy="86" r="64" stroke="url(#ink)" stroke-width="28"/>
      <path d="M184 35H286L218 174" stroke="url(#signal)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M135 151C177 124 217 108 282 100" stroke="url(#signal)" stroke-width="15" stroke-linecap="round"/>
      <circle cx="284" cy="100" r="13" fill="#22C55E"/>
    </g>
    <text x="52" y="238" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0">os7</text>
    <text x="168" y="238" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="16">orbit / app routes</text>
  </g>

  <!-- Concept B: platform wordmark -->
  <g transform="translate(605 170)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#FFFFFF"/>
    <g transform="translate(52 58)">
      <path d="M37 128C14 105 14 59 37 36C60 13 106 13 129 36C152 59 152 105 129 128C106 151 60 151 37 128Z" stroke="#0F172A" stroke-width="24"/>
      <path d="M166 128C185 145 233 148 251 126C270 103 255 82 220 80C185 78 169 61 183 41C199 17 244 19 264 36" stroke="#0F172A" stroke-width="24" stroke-linecap="round"/>
      <path d="M300 33H370L319 147" stroke="url(#signal)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="52" y="238" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Custom wordmark direction</text>
  </g>

  <!-- Concept C: base tile -->
  <g transform="translate(1100 170)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#0F172A"/>
    <g transform="translate(68 44)">
      <rect x="0" y="13" width="166" height="166" rx="40" stroke="#F8FAFC" stroke-width="18"/>
      <path d="M202 14H302L236 179" stroke="url(#signal-warm)" stroke-width="27" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 83H132" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round"/>
      <path d="M83 34V132" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round"/>
    </g>
    <text x="68" y="238" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0">os7</text>
    <text x="184" y="238" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">base / system tile</text>
  </g>

  <!-- Concept D: monoline symbol -->
  <g transform="translate(110 615)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#FFFFFF"/>
    <g transform="translate(64 50)">
      <path d="M90 12C133 12 168 47 168 90C168 133 133 168 90 168C47 168 12 133 12 90C12 47 47 12 90 12Z" stroke="#111827" stroke-width="20"/>
      <path d="M189 12H306L218 168" stroke="#111827" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M58 90C85 74 122 74 149 90" stroke="#06B6D4" stroke-width="14" stroke-linecap="round"/>
      <path d="M215 118C238 108 265 103 294 103" stroke="#06B6D4" stroke-width="14" stroke-linecap="round"/>
    </g>
    <text x="64" y="238" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Monoline, clean SaaS alternative</text>
  </g>

  <!-- Concept E: app constellation -->
  <g transform="translate(605 615)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#FFFFFF"/>
    <g transform="translate(58 46)">
      <circle cx="84" cy="84" r="66" stroke="#0F172A" stroke-width="24"/>
      <path d="M185 26H293L220 170" stroke="url(#signal)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="25" cy="160" r="13" fill="#22C55E"/>
      <circle cx="145" cy="23" r="13" fill="#06B6D4"/>
      <circle cx="295" cy="124" r="13" fill="#6366F1"/>
      <path d="M37 153C94 105 166 75 282 124" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round"/>
    </g>
    <text x="58" y="238" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Apps, data, agents connected</text>
  </g>

  <!-- Concept F: compact favicon -->
  <g transform="translate(1100 615)" filter="url(#soft-shadow)">
    <rect width="390" height="280" rx="34" fill="#FFFFFF"/>
    <g transform="translate(79 36)">
      <rect width="214" height="214" rx="54" fill="#0F172A"/>
      <path d="M60 143C37 120 37 80 60 57C83 34 123 34 146 57C169 80 169 120 146 143C123 166 83 166 60 143Z" stroke="#F8FAFC" stroke-width="19"/>
      <path d="M136 60H175L137 155" stroke="url(#signal)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="79" y="238" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Compact app icon / favicon</text>
  </g>
</svg>
